name: ScwOrder-WhatsApp-Bot

on:
  workflow_dispatch:
  schedule:
    # Safety net only — runs if the job crashed/was cancelled
    # Normal operation: bot restarts itself internally before 6h limit
    - cron: '0 */5 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # 5h 50min — bot exits itself at 5h 45min

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Start Bot
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          NODE_NO_WARNINGS: 1
          # Bot will exit cleanly after this many minutes, then cron restarts it
          MAX_RUNTIME_MINUTES: '340'
        run: node --no-warnings index.js
