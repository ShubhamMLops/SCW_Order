name: ScwOrder-WhatsApp-Bot

on:
  workflow_dispatch:
  schedule:
    # Restart every 5 hours — before GitHub's 6h limit kills it
    - cron: '0 */5 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5h 50min — leaves 10min buffer before 6h GitHub limit

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Start Bot
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          NODE_NO_WARNINGS: 1
        run: node --no-warnings index.js
